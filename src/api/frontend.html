<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koakuma SQL Console</title>

    <!-- @vendor-css -->

    <style>
        :root {
            --bg:             #f4f1ea;
            --panel:          #fffdf9;
            --panel-border:   #ded6c8;
            --text:           #1f2328;
            --muted:          #67635d;
            --accent:         #4f6f52;
            --accent-hover:   #3f5c42;
            --success-bg:     #eef5ee;
            --success-border: #c9ddca;
            --error-bg:       #fbefef;
            --error-border:   #e3c2c2;
        }

        /* ── Reset ───────────────────────────────────────────────── */
        * { box-sizing: border-box; }

        /* ── Layout ──────────────────────────────────────────────── */
        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255,255,255,.6), transparent 35%),
                linear-gradient(180deg, #ece6dc 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Segoe UI", "Trebuchet MS", sans-serif;
            padding: 24px;
        }

        .shell {
            max-width: 960px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(31,35,40,.08);
            overflow: hidden;
        }

        .header {
            padding: 28px 30px 18px;
            border-bottom: 1px solid rgba(31,35,40,.08);
        }

        h1 {
            margin: 0;
            font-size: 30px;
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -.02em;
        }

        .subtitle {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 15px;
        }

        .content { padding: 28px 30px 32px; }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        /* ── CodeMirror overrides ────────────────────────────────── */
        .CodeMirror {
            border: 1px solid #cfc7b8;
            border-radius: 10px;
            font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
            font-size: 14px;
            line-height: 1.6;
            height: auto;
            min-height: 170px;
            background: #fff;
            color: var(--text);
            transition: border-color .15s, box-shadow .15s;
        }

        .CodeMirror-focused {
            border-color: rgba(79,111,82,.75);
            box-shadow: 0 0 0 3px rgba(79,111,82,.12);
            outline: none;
        }

        .CodeMirror-scroll { min-height: 170px; }

        .CodeMirror-gutters {
            border-right: 1px solid #e8e2d8;
            background: #faf8f3;
            border-radius: 10px 0 0 10px;
        }

        .CodeMirror-linenumber { color: #9a9690; }

        .CodeMirror-activeline-background { background: rgba(79,111,82,.04); }

        .CodeMirror-selected { background: rgba(79,111,82,.18) !important; }

        /* ── SQL syntax colors ───────────────────────────────────── */
        .cm-s-default .cm-keyword  { color: #0057ae; font-weight: 600; }
        .cm-s-default .cm-atom     { color: #0057ae; }
        .cm-s-default .cm-type     { color: #6d28d9; }
        .cm-s-default .cm-builtin  { color: #6d28d9; }
        .cm-s-default .cm-string   { color: #c2410c; }
        .cm-s-default .cm-string-2 { color: #c2410c; }
        .cm-s-default .cm-number   { color: #0891b2; }
        .cm-s-default .cm-comment  { color: #6b7280; font-style: italic; }
        .cm-s-default .cm-operator { color: #374151; }

        /* ── Autocomplete dropdown ────────────────────────────────── */
        .CodeMirror-hints {
            border: 1px solid #d8d2c6;
            border-radius: 8px;
            box-shadow: 0 4px 12px rgba(31,35,40,.12);
            font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
            font-size: 13px;
            background: #fff;
            padding: 4px;
        }

        .CodeMirror-hint {
            padding: 4px 10px;
            border-radius: 4px;
            color: var(--text);
        }

        li.CodeMirror-hint-active {
            background: rgba(79,111,82,.15);
            color: var(--text);
        }

        /* ── Buttons ─────────────────────────────────────────────── */
        .button-row {
            display: flex;
            gap: 12px;
            margin-top: 14px;
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 11px 18px;
            font: inherit;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-execute { background: var(--accent); color: #fff; flex: 1; }
        .btn-execute:hover { background: var(--accent-hover); }

        .btn-clear { background: #ece7df; color: #2c2a27; }
        .btn-clear:hover { background: #e2dbd0; }

        /* ── Results ─────────────────────────────────────────────── */
        .results { margin-top: 26px; }

        .result-box {
            border: 1px solid #d8d2c6;
            border-radius: 10px;
            background: #faf8f3;
            padding: 16px;
            min-height: 72px;
            max-height: 420px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
            font-size: 13px;
            line-height: 1.5;
        }

        .result-box.success { background: var(--success-bg); border-color: var(--success-border); }
        .result-box.error   { background: var(--error-bg);   border-color: var(--error-border); color: #8a2d2d; }
        .result-box.loading { color: var(--muted); font-style: italic; }

        .result-summary { margin: 0 0 12px; white-space: normal; font-weight: 600; }

        .result-table-wrap { overflow-x: auto; }

        .result-table {
            width: 100%;
            border-collapse: collapse;
            white-space: normal;
            background: #fff;
            border: 1px solid rgba(31,35,40,.12);
            border-radius: 8px;
            overflow: hidden;
        }

        .result-table th,
        .result-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(31,35,40,.08);
            vertical-align: top;
        }

        .result-table th { background: rgba(79,111,82,.08); font-weight: 700; }
        .result-table tbody tr:last-child td { border-bottom: 0; }
        .result-table td.is-null { color: var(--muted); font-style: italic; }

        .hidden { display: none; }

        @media (max-width: 640px) {
            body { padding: 12px; }
            .header, .content { padding-left: 18px; padding-right: 18px; }
            .button-row { flex-direction: column; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <section class="header">
            <h1>Koakuma SQL Console</h1>
            <p class="subtitle">Run SQL statements against the local database.</p>
        </section>

        <section class="content">
            <div>
                <label for="editorMount">SQL Query</label>
                <div id="editorMount"></div>
                <div class="button-row">
                    <button type="button" class="btn-execute" id="btnExecute">Execute Query</button>
                    <button type="button" class="btn-clear"   id="btnClear">Clear</button>
                </div>
            </div>

            <div class="results hidden" id="resultsSection">
                <label>Results</label>
                <div class="result-box" id="resultBox" role="region" aria-live="polite"></div>
            </div>
        </section>
    </main>

    <!-- @vendor-js -->

    <script>
        'use strict';

        // ── Constants ─────────────────────────────────────────────

        const API_QUERY_PATH = '/query';

        const HINT_TRIGGER_PATTERN = /[a-zA-Z_]/;

        // ── CodeMirror setup ──────────────────────────────────────

        const editor = CodeMirror(document.getElementById('editorMount'), {
            mode:              'text/x-sql',
            lineNumbers:       true,
            matchBrackets:     true,
            autoCloseBrackets: true,
            styleActiveLine:   true,
            lineWrapping:      true,
            tabSize:           4,
            indentWithTabs:    false,
            extraKeys: {
                'Ctrl-Enter': executeQuery,
                'Cmd-Enter':  executeQuery,
                'Ctrl-Space': 'autocomplete',
                Tab: (cm) => cm.execCommand('insertSoftTab'),
            },
            hintOptions: { completeSingle: false, alignWithWord: true },
        });

        editor.on('inputRead', (cm, change) => {
            if (HINT_TRIGGER_PATTERN.test(change.text[0])) {
                cm.showHint({ completeSingle: false });
            }
        });

        // ── DOM helpers ───────────────────────────────────────────

        function getElement(id) {
            const el = document.getElementById(id);
            if (!el) throw new Error(`Element not found: #${id}`);
            return el;
        }

        function createCell(tag, text, className) {
            const el = document.createElement(tag);
            if (className) el.className = className;
            el.textContent = text;
            return el;
        }

        function getColumnName(col, index) {
            return col?.name?.trim() || `Column ${index + 1}`;
        }

        function formatValue(value) {
            if (value === null || value === undefined) return 'NULL';
            return typeof value === 'string' ? value : String(value);
        }

        // ── Result rendering ──────────────────────────────────────

        function setResultState(box, state) {
            box.className = `result-box ${state}`;
        }

        function renderSuccess(box, data) {
            box.textContent = '';

            const summary = document.createElement('p');
            summary.className = 'result-summary';
            const io = data.diskIO ?? { reads: '?', writes: '?' };
            summary.textContent =
                `Success | Statements: ${data.acceptedStatements} | ` +
                `Parse: ${data.timingMs.parse} ms | Exec: ${data.timingMs.exec} ms | ` +
                `Disk reads: ${io.reads} | Disk writes: ${io.writes}`;
            box.appendChild(summary);

            const rows = Array.isArray(data.rows) ? data.rows : [];
            if (rows.length === 0) {
                const empty = document.createElement('div');
                empty.textContent = 'No rows returned.';
                box.appendChild(empty);
                return;
            }

            const columns   = Array.isArray(data.columns) ? data.columns : [];
            const colCount  = Math.max(columns.length, rows[0]?.length ?? 0);
            const wrap      = document.createElement('div');
            const table     = document.createElement('table');
            const thead     = document.createElement('thead');
            const headerRow = document.createElement('tr');

            wrap.className  = 'result-table-wrap';
            table.className = 'result-table';

            for (let i = 0; i < colCount; i++) {
                headerRow.appendChild(createCell('th', getColumnName(columns[i], i)));
            }
            thead.appendChild(headerRow);

            const tbody = document.createElement('tbody');
            rows.forEach((row) => {
                const tr = document.createElement('tr');
                for (let i = 0; i < colCount; i++) {
                    const value = row?.[i];
                    const isNull = value === null || value === undefined;
                    tr.appendChild(createCell('td', formatValue(value), isNull ? 'is-null' : ''));
                }
                tbody.appendChild(tr);
            });

            table.append(thead, tbody);
            wrap.appendChild(table);
            box.appendChild(wrap);
        }

        function renderError(box, error) {
            let text = `Error\nCode: ${error.code}\nMessage: ${error.message}`;
            if (error.detail) text += `\nDetail: ${error.detail}`;
            box.textContent = text;
        }

        // ── Actions ───────────────────────────────────────────────

        async function executeQuery() {
            const query          = editor.getValue().trim();
            const resultsSection = getElement('resultsSection');
            const resultBox      = getElement('resultBox');

            if (!query) {
                window.alert('Please enter a SQL query.');
                return;
            }

            resultsSection.classList.remove('hidden');
            resultBox.textContent = 'Running query…';
            setResultState(resultBox, 'loading');

            try {
                const response = await fetch(API_QUERY_PATH, {
                    method:  'POST',
                    body:    query,
                    headers: { 'Content-Type': 'text/plain' },
                });

                const payload = await response.json();

                if (payload.status === 'success') {
                    renderSuccess(resultBox, payload.data);
                    setResultState(resultBox, 'success');
                } else {
                    renderError(resultBox, payload.error);
                    setResultState(resultBox, 'error');
                }
            } catch (err) {
                resultBox.textContent = `Network error: ${err.message}`;
                setResultState(resultBox, 'error');
            }
        }

        function clearAll() {
            editor.setValue('');
            editor.focus();
            getElement('resultsSection').classList.add('hidden');
            const box = getElement('resultBox');
            box.textContent = '';
            box.className = 'result-box';
        }

        // ── Init ──────────────────────────────────────────────────

        getElement('btnExecute').addEventListener('click', executeQuery);
        getElement('btnClear').addEventListener('click', clearAll);
    </script>
</body>
</html>
